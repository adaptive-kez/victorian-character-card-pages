<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Пять дней до петли - карточки</title>
  <style>
    :root {
      --bg: #efe9dc;
      --paper: #fffaf0;
      --paper-2: #f6efe1;
      --ink: #25231f;
      --muted: #746d60;
      --line: #d5c6b3;
      --accent: #8f2f2b;
      --accent-2: #bd7a2f;
      --dark: #2f2622;
      --good: #2f6f4f;
      --warn: #9a6a20;
      --bad: #9c2f2f;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 0%, rgba(143, 47, 43, 0.12), transparent 32rem),
        linear-gradient(180deg, #f7f1e5 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    a { color: inherit; }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 20px 0 18px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.05;
      color: var(--dark);
    }

    .lead {
      max-width: 820px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 8px 0 20px;
      padding: 12px;
      background: rgba(255, 250, 240, 0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
    }

    .search {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fffdf7;
      color: var(--ink);
      font-size: 15px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .filter {
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper-2);
      color: var(--ink);
      font-weight: 700;
    }

    .filter.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fffaf0;
    }

    .section {
      margin-top: 26px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      color: var(--dark);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      display: grid;
      gap: 14px;
      padding: 16px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 32px rgba(47, 38, 34, 0.08);
    }

    .card:target {
      outline: 3px solid rgba(143, 47, 43, 0.28);
      scroll-margin-top: 86px;
    }

    .card-head {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .sigil {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      color: #fffaf0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: 700;
    }

    .card h3 {
      margin: 0 0 4px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 21px;
      color: var(--dark);
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .type {
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--paper-2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-height: 58px;
      padding: 9px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper-2);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1;
    }

    .hp-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .hp-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fffdf7;
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .hpbar {
      flex: 1;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #ded0bd;
    }

    .hpfill {
      height: 100%;
      width: 100%;
      background: var(--good);
      transition: width .2s ease, background .2s ease;
    }

    .block h4 {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .block p {
      margin: 0;
      color: var(--ink);
      font-size: 14px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li + li { margin-top: 4px; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdf7;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .action {
      padding: 10px;
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      background: var(--paper-2);
    }

    .action b { color: var(--dark); }

    .card-foot {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .copy {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      .app { width: min(100vw - 20px, 1180px); padding-top: 12px; }
      .toolbar { grid-template-columns: 1fr; }
      .filters { justify-content: stretch; }
      .filter { flex: 1; }
      .card-head { grid-template-columns: 46px 1fr; }
      .type { grid-column: 1 / -1; justify-self: start; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>

    <main id="content"></main>

    const labels = { hero: "Герой", npc: "NPC", mob: "Моб" };
    const groups = [
      ["hero", "Герои"],
      ["npc", "NPC и свидетели"],
      ["mob", "Мобы и угрозы"]
    ];

    const state = { filter: "all", q: "" };

    function cardText(card) {
      return [
        card.name,
        card.subtitle,
        card.role,
        ...(card.attrs || []),
        ...(card.scenes || []),
        ...(card.actions || []).flat()
      ].join(" ").toLowerCase();
    }

    function getHp(card) {
      if (!card.hp) return null;
      const key = "hp:" + card.id;
      const saved = localStorage.getItem(key);
      return saved === null ? card.hp : Math.max(0, Number(saved));
    }

    function setHp(card, next) {
      const value = Math.max(0, Math.min(card.hp, next));
      localStorage.setItem("hp:" + card.id, value);
      render();
    }

    function renderCard(card) {
      const hp = getHp(card);
      const statEntries = Object.entries(card.stats || {});
      const hpPct = card.hp ? Math.round((hp / card.hp) * 100) : 0;
      const hpColor = hpPct <= 30 ? "var(--bad)" : hpPct <= 60 ? "var(--warn)" : "var(--good)";
      const attrs = (card.attrs || []).map(x => `<span class="chip">${x}</span>`).join("");
      const scenes = (card.scenes || []).map(x => `<span class="chip">${x}</span>`).join("");
      const actions = (card.actions || []).map(([name, text]) => `<div class="action"><b>${name}.</b> ${text}</div>`).join("");
      const stats = statEntries.map(([k, v]) => `<div class="stat"><span>${k}</span><strong>${v}</strong></div>`).join("");
      const hpBlock = card.hp ? `
        <div class="hp-controls">
          <button class="hp-btn" type="button" data-hp="${card.id}" data-delta="-1">-</button>
          <div class="hpbar" title="${hp}/${card.hp}"><div class="hpfill" style="width:${hpPct}%;background:${hpColor}"></div></div>
          <button class="hp-btn" type="button" data-hp="${card.id}" data-delta="1">+</button>
        </div>` : "";

      return `
        <article class="card" id="${card.id}" data-type="${card.type}">
          <div class="card-head">
            <div class="sigil">${card.sigil}</div>
            <div>
              <h3>${card.name}</h3>
              <div class="subtitle">${card.subtitle}</div>
            </div>
            <div class="type">${labels[card.type]}</div>
          </div>
          <div class="stats">${stats}</div>
          ${hpBlock}
          <div class="block"><h4>Роль</h4><p>${card.role}</p></div>
          ${attrs ? `<div class="block"><h4>Характеристики</h4><div class="chips">${attrs}</div></div>` : ""}
          <div class="block"><h4>Действия / улики</h4><div class="actions">${actions}</div></div>
          ${scenes ? `<div class="block"><h4>Сцены</h4><div class="chips">${scenes}</div></div>` : ""}
          <div class="card-foot">
            <span>#${card.id}</span>
            <button class="copy" type="button" data-copy="${card.id}">Скопировать ссылку</button>
          </div>
        </article>
      `;
    }

    function render() {
      const content = document.getElementById("content");
      const q = state.q.trim().toLowerCase();
      const filtered = cards.filter(card => {
        const typeOk = state.filter === "all" || card.type === state.filter;
        const searchOk = !q || cardText(card).includes(q);
        return typeOk && searchOk;
      });

      content.innerHTML = groups.map(([type, title]) => {
        const items = filtered.filter(card => card.type === type);
        if (!items.length) return "";
        return `
          <section class="section">
            <h2>${title}</h2>
            <div class="grid">${items.map(renderCard).join("")}</div>
          </section>
        `;
      }).join("") || `<p class="lead">Ничего не найдено.</p>`;

      document.querySelectorAll("[data-hp]").forEach(btn => {
        btn.addEventListener("click", () => {
          const card = cards.find(x => x.id === btn.dataset.hp);
          setHp(card, getHp(card) + Number(btn.dataset.delta));
        });
      });

      document.querySelectorAll("[data-copy]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const url = location.origin + location.pathname + "#" + btn.dataset.copy;
          await navigator.clipboard.writeText(url);
          btn.textContent = "Ссылка скопирована";
          setTimeout(() => btn.textContent = "Скопировать ссылку", 1200);
        });
      });
    }

    document.getElementById("search").addEventListener("input", event => {
      state.q = event.target.value;
      render();
    });

    document.querySelectorAll(".filter").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        state.filter = btn.dataset.filter;
        render();
      });
    });

    render();
  </script>
