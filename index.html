<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victorian Character Cards</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1e9;
      --panel: #fffdf7;
      --text: #24231f;
      --muted: #6e6a5f;
      --border: #d5cec0;
      --accent: #639922;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      padding: 32px 18px;
    }

    main {
      width: min(860px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 6vw, 54px);
      line-height: 1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    a {
      display: block;
      min-height: 86px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      box-shadow: 0 18px 40px rgba(36, 35, 31, 0.08);
    }

    a:hover,
    a:focus-visible {
      border-color: var(--accent);
      outline: 2px solid rgba(99, 153, 34, 0.22);
      outline-offset: 2px;
    }

    span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Victorian Character Cards</h1>
    <p>Опубликованные карточки персонажей.</p>
    <div class="grid">
      <a href="./vitto-skalette/">Vitto Skalette<span>/vitto-skalette/</span></a>
      <a href="./dendi-soblaznitel/">Денди-Соблазнитель<span>/dendi-soblaznitel/</span></a>
      <a href="./tihaya-monahinya/">Тихая Монахиня<span>/tihaya-monahinya/</span></a>
      <a href="./nastyrnyy-reporter/">Настырный Репортёр<span>/nastyrnyy-reporter/</span></a>
      <a href="./dimasik/">Димасик<span>/dimasik/</span></a>
      <a href="./jack-ripper/">Джек Потрошитель<span>/jack-ripper/</span></a>
      <a href="./zhandarm/">Жандарм<span>/zhandarm/</span></a>
      <a href="./shpana/">Шпана<span>/shpana/</span></a>
    </div>
  </main>
</body>
</html>
